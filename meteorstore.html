<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Store - Buying Offers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .debug-toggle input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .store-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-container {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .charts-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .chart-box {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            text-align: center;
        }
        
        .chart-container canvas {
            max-width: 100%;
            max-height: 400px;
            margin: 0 auto;
        }
        
        .papers-summary {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        .papers-summary h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .papers-summary p {
            margin: 5px 0;
            color: #333;
        }
        
        .store-header {
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .store-name {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }
        
        .store-owner {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .offers-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .offers-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        
        .offers-table th:hover {
            background: #e9ecef;
        }
        
        .offers-table th.sortable::after {
            content: ' ⇅';
            opacity: 0.3;
        }
        
        .offers-table th.sorted-asc::after {
            content: ' ▲';
            opacity: 1;
        }
        
        .offers-table th.sorted-desc::after {
            content: ' ▼';
            opacity: 1;
        }
        
        .offers-table th.align-right,
        .offers-table td.align-right {
            text-align: right;
        }
        
        .offers-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .offers-table tr:hover {
            background: #f8f9fa;
        }
        
        .price {
            color: #28a745;
            font-weight: bold;
        }
        
        .quantity {
            color: #007bff;
        }
        
        .item-available {
            text-decoration: line-through;
            opacity: 0.6;
        }
        
        .row-available {
            text-decoration: line-through;
            opacity: 0.6;
        }
        
        .no-offers {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            margin-left: 10px;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        .copy-btn.copied {
            background: #6c757d;
        }
        
        .last-update {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .debug-info {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
        }
        
        .debug-info div {
            margin: 5px 0;
        }
        
        .debug-label {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌠 Meteor Store - Buying Offers</h1>
            <div class="header-controls">
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
                <label class="debug-toggle">
                    <input type="checkbox" id="debugModeToggle" onchange="toggleDebugMode()">
                    Debug Mode
                </label>
            </div>
            <div class="last-update" id="lastUpdate"></div>
            <div class="debug-info" id="debugInfo" style="display: none;"></div>
        </header>
        
        <div id="loading" class="loading">Loading data...</div>
        <div id="error" style="display: none;"></div>
        <div id="stores"></div>
    </div>

    <script>
        // ============================================
        // DEBUG MODE - Controlled by checkbox
        // ============================================
        let DEBUG_MODE = false;
        // ============================================
        
        function toggleDebugMode() {
            DEBUG_MODE = document.getElementById('debugModeToggle').checked;
            const debugInfoEl = document.getElementById('debugInfo');
            
            if (DEBUG_MODE) {
                debugInfoEl.style.display = 'block';
                console.log('🔍 Debug mode enabled');
            } else {
                debugInfoEl.style.display = 'none';
                console.log('🔍 Debug mode disabled');
            }
        }
        
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const storesEl = document.getElementById('stores');
            const lastUpdateEl = document.getElementById('lastUpdate');
            const debugInfoEl = document.getElementById('debugInfo');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            storesEl.innerHTML = '';
            debugInfoEl.innerHTML = '';
            
            try {
                if (DEBUG_MODE) console.log('🔍 Starting data fetch...');
                
                // Fetch stores data
                const storesResponse = await fetch('https://white-tiger.play.eco/api/v1/plugins/EcoPriceCalculator/stores');
                
                if (DEBUG_MODE) console.log('📡 Stores Response Status:', storesResponse.status);
                
                if (!storesResponse.ok) {
                    throw new Error(`HTTP Error (Stores): ${storesResponse.status}`);
                }
                
                const storesData = await storesResponse.json();
                if (DEBUG_MODE) console.log('📦 Stores data received:', storesData);
                
                // Create a map of available items from ALL stores (selling offers)
                // Store both total availability and price-filtered availability
                const marketAvailability = {};
                const allStores = storesData.Stores || [];
                
                allStores.forEach(store => {
                    const offers = store.AllOffers || [];
                    offers.forEach(offer => {
                        // Check for selling offers (Buying = false)
                        if (offer.Buying === false && offer.Quantity > 0 && offer.Price > 0) {
                            const itemName = offer.ItemName;
                            if (!marketAvailability[itemName]) {
                                marketAvailability[itemName] = {
                                    total: 0,
                                    byPrice: []
                                };
                            }
                            marketAvailability[itemName].total += offer.Quantity;
                            marketAvailability[itemName].byPrice.push({
                                quantity: offer.Quantity,
                                price: offer.Price
                            });
                        }
                    });
                });
                
                if (DEBUG_MODE) console.log('🛒 Market availability:', marketAvailability);
                
                // Fetch recipes data
                const recipesResponse = await fetch('https://white-tiger.play.eco/api/v1/plugins/EcoPriceCalculator/recipes');
                
                if (DEBUG_MODE) console.log('📡 Recipes Response Status:', recipesResponse.status);
                
                if (!recipesResponse.ok) {
                    throw new Error(`HTTP Error (Recipes): ${recipesResponse.status}`);
                }
                
                const recipesData = await recipesResponse.json();
                if (DEBUG_MODE) console.log('📦 Recipes data received:', recipesData);
                
                // Create a map of item name to skill name + level
                const itemSkillMap = {};
                if (recipesData.Recipes) {
                    recipesData.Recipes.forEach(recipe => {
                        const variants = recipe.Variants || [];
                        const skillNeeds = recipe.SkillNeeds || [];
                        
                        // Check all variants for products
                        variants.forEach(variant => {
                            const products = variant.Products || [];
                            products.forEach(product => {
                                const itemName = product.Name;
                                
                                // Only map if we haven't seen this item yet (take first recipe)
                                if (itemName && !itemSkillMap[itemName]) {
                                    // Extract skill name and level from SkillNeeds[0]
                                    if (skillNeeds.length > 0 && skillNeeds[0].Skill) {
                                        const skillName = skillNeeds[0].Skill;
                                        const skillLevel = skillNeeds[0].Level || '';
                                        itemSkillMap[itemName] = skillLevel ? `${skillName} ${skillLevel}` : skillName;
                                    } else {
                                        itemSkillMap[itemName] = 'N/A';
                                    }
                                }
                            });
                        });
                    });
                }
                
                if (DEBUG_MODE) console.log('🔧 Item-Skill map created:', itemSkillMap);
                
                const stores = storesData.Stores || [];
                if (DEBUG_MODE) console.log(`🏪 Total stores: ${stores.length}`);
                
                // Debug: Log all store names
                if (DEBUG_MODE) {
                    stores.forEach((store, index) => {
                        console.log(`Store ${index + 1}: "${store.Name}" (Owner: ${store.Owner}, Enabled: ${store.Enabled})`);
                    });
                }
                
                const meteorStores = stores.filter(store => 
                    store.Name && store.Name.includes('Meteor Store')
                );
                
                // Sort Meteor Stores in reverse alphabetical order
                meteorStores.sort((a, b) => b.Name.localeCompare(a.Name));
                
                if (DEBUG_MODE) console.log(`🌠 Meteor Stores found: ${meteorStores.length}`);
                
                // Debug info display
                let totalBuyingOffers = 0;
                meteorStores.forEach(store => {
                    const buyingOffers = (store.AllOffers || []).filter(offer => 
                        offer.Buying === true && 
                        offer.Price > 0 && 
                        offer.Quantity > 0
                    );
                    totalBuyingOffers += buyingOffers.length;
                });
                
                if (DEBUG_MODE) {
                    debugInfoEl.innerHTML = `
                        <div><span class="debug-label">🔍 DEBUG INFO:</span></div>
                        <div>✓ Total stores: ${stores.length}</div>
                        <div>✓ Meteor Stores found: ${meteorStores.length}</div>
                        <div>✓ Active buying offers: ${totalBuyingOffers}</div>
                        <div>✓ All store names: ${stores.map(s => s.Name).join(', ') || 'None found'}</div>
                    `;
                }
                
                if (meteorStores.length === 0) {
                    storesEl.innerHTML = '<div class="store-card"><div class="no-offers">No Meteor Stores found</div></div>';
                } else {
                    meteorStores.forEach(store => {
                        const allOffers = store.AllOffers || [];
                        const buyingOffers = allOffers.filter(offer => 
                            offer.Buying === true && 
                            offer.Price > 0 && 
                            offer.Quantity > 0
                        );
                        
                        // Separate research papers from regular items
                        const researchPapers = buyingOffers.filter(offer => 
                            offer.ItemName && offer.ItemName.endsWith('Research Paper Modern')
                        );
                        
                        const regularOffers = buyingOffers.filter(offer => 
                            !offer.ItemName || !offer.ItemName.endsWith('Research Paper Modern')
                        );
                        
                        if (DEBUG_MODE) {
                            console.log(`📋 Store "${store.Name}": ${allOffers.length} total offers, ${regularOffers.length} regular offers, ${researchPapers.length} research papers`);
                        }
                        
                        const storeCard = document.createElement('div');
                        storeCard.className = 'store-card';
                        storeCard.dataset.storeName = store.Name;
                        storeCard.dataset.storeOffers = JSON.stringify(buyingOffers.map(offer => ({
                            ...offer,
                            Skill: itemSkillMap[offer.ItemName] || 'N/A'
                        })));
                        
                        // Sort regular offers by Skill first, then by Item Name
                        regularOffers.sort((a, b) => {
                            const skillA = itemSkillMap[a.ItemName] || 'N/A';
                            const skillB = itemSkillMap[b.ItemName] || 'N/A';
                            
                            // First compare by skill
                            const skillComparison = skillA.localeCompare(skillB);
                            if (skillComparison !== 0) return skillComparison;
                            
                            // If skills are the same, compare by item name
                            return (a.ItemName || '').localeCompare(b.ItemName || '');
                        });
                        
                        // Sort research papers by name
                        researchPapers.sort((a, b) => 
                            (a.ItemName || '').localeCompare(b.ItemName || '')
                        );
                        
                        // Calculate skill volumes for regular items pie chart (exclude items with market availability)
                        const skillVolumes = {};
                        regularOffers.forEach(offer => {
                            const itemData = marketAvailability[offer.ItemName];
                            let inRangeQty = 0;
                            
                            if (itemData) {
                                const buyPrice = offer.Price;
                                const maxPrice = buyPrice * 1.2; // 20% higher
                                
                                itemData.byPrice.forEach(sellOffer => {
                                    // Consider available if price > 0 and <= maxPrice (cheaper or up to 20% more expensive)
                                    if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                        inRangeQty += sellOffer.quantity;
                                    }
                                });
                            }
                            
                            // Only include in chart if NOT enough available on market within price range
                            if (inRangeQty < offer.Quantity) {
                                const fullSkill = itemSkillMap[offer.ItemName] || 'N/A';
                                // Remove level number from skill
                                const skillName = fullSkill.replace(/\s+\d+$/, '');
                                const volume = offer.Price * offer.Quantity;
                                
                                if (!skillVolumes[skillName]) {
                                    skillVolumes[skillName] = 0;
                                }
                                skillVolumes[skillName] += volume;
                            }
                        });
                        
                        // Add research papers to skill volumes as "Modern Paper" category
                        let modernPaperVolume = 0;
                        researchPapers.forEach(offer => {
                            const itemData = marketAvailability[offer.ItemName];
                            let inRangeQty = 0;
                            
                            if (itemData) {
                                const buyPrice = offer.Price;
                                const maxPrice = buyPrice * 1.2;
                                
                                itemData.byPrice.forEach(sellOffer => {
                                    if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                        inRangeQty += sellOffer.quantity;
                                    }
                                });
                            }
                            
                            // Only include in chart if NOT enough available on market within price range
                            if (inRangeQty < offer.Quantity) {
                                const volume = offer.Price * offer.Quantity;
                                modernPaperVolume += volume;
                            }
                        });
                        
                        if (modernPaperVolume > 0) {
                            skillVolumes['Modern Paper'] = modernPaperVolume;
                        }
                        
                        // Calculate volumes for research papers pie chart (exclude items with market availability)
                        const paperVolumes = {};
                        researchPapers.forEach(offer => {
                            const itemData = marketAvailability[offer.ItemName];
                            let inRangeQty = 0;
                            
                            if (itemData) {
                                const buyPrice = offer.Price;
                                const maxPrice = buyPrice * 1.2;
                                
                                itemData.byPrice.forEach(sellOffer => {
                                    if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                        inRangeQty += sellOffer.quantity;
                                    }
                                });
                            }
                            
                            // Only include in chart if NOT enough available on market within price range
                            if (inRangeQty < offer.Quantity) {
                                const paperName = offer.ItemName;
                                const volume = offer.Price * offer.Quantity;
                                paperVolumes[paperName] = volume;
                            }
                        });
                        
                        if (DEBUG_MODE) {
                            console.log(`📊 Regular skill volumes for "${store.Name}":`, skillVolumes);
                            console.log(`📊 Paper volumes for "${store.Name}":`, paperVolumes);
                        }
                        
                        let offersHtml = '';
                        if (buyingOffers.length === 0) {
                            offersHtml = '<div class="no-offers">No active buying offers</div>';
                        } else {
                            const tableId = `table-${store.Name.replace(/\s+/g, '-')}`;
                            const chartId = `chart-${store.Name.replace(/\s+/g, '-')}`;
                            const papersTableId = `papers-table-${store.Name.replace(/\s+/g, '-')}`;
                            const papersChartId = `papers-chart-${store.Name.replace(/\s+/g, '-')}`;
                            
                            // Create charts section
                            let chartsHtml = '<div class="chart-container"><div class="charts-wrapper">';
                            
                            if (regularOffers.length > 0) {
                                chartsHtml += `
                                    <div class="chart-box">
                                        <h3>Regular Items by Skill</h3>
                                        <canvas id="${chartId}"></canvas>
                                    </div>
                                `;
                            }
                            
                            if (researchPapers.length > 0) {
                                chartsHtml += `
                                    <div class="chart-box">
                                        <h3>Research Papers</h3>
                                        <canvas id="${papersChartId}"></canvas>
                                    </div>
                                `;
                            }
                            
                            chartsHtml += '</div></div>';
                            
                            // Create regular items table
                            let regularTableHtml = '';
                            if (regularOffers.length > 0) {
                                regularTableHtml = `
                                    <h3>Regular Items</h3>
                                    <table class="offers-table" id="${tableId}">
                                        <thead>
                                            <tr>
                                                <th class="sortable" data-column="item" onclick="sortTable('${tableId}', 'item', this)">Item</th>
                                                <th class="sortable" data-column="skill" onclick="sortTable('${tableId}', 'skill', this)">Skill</th>
                                                <th class="sortable align-right" data-column="price" onclick="sortTable('${tableId}', 'price', this)">Price</th>
                                                <th class="sortable align-right" data-column="quantity" onclick="sortTable('${tableId}', 'quantity', this)">Quantity</th>
                                                <th class="sortable align-right" data-column="available" onclick="sortTable('${tableId}', 'available', this)">Available</th>
                                                <th class="sortable align-right" data-column="expensive" onclick="sortTable('${tableId}', 'expensive', this)">Too Expensive</th>
                                                <th class="sortable align-right" data-column="volume" onclick="sortTable('${tableId}', 'volume', this)">Volume</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${regularOffers.map(offer => {
                                                const skillName = itemSkillMap[offer.ItemName] || 'N/A';
                                                const itemData = marketAvailability[offer.ItemName];
                                                
                                                let inRangeQty = 0;
                                                let outOfRangeQty = 0;
                                                
                                                if (itemData) {
                                                    const buyPrice = offer.Price;
                                                    const maxPrice = buyPrice * 1.2; // 20% higher
                                                    
                                                    itemData.byPrice.forEach(sellOffer => {
                                                        // In range: any price > 0 and <= maxPrice (cheaper or up to 20% more)
                                                        if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                                            inRangeQty += sellOffer.quantity;
                                                        } else if (sellOffer.price > maxPrice) {
                                                            // Too expensive: price > maxPrice
                                                            outOfRangeQty += sellOffer.quantity;
                                                        }
                                                    });
                                                }
                                                
                                                const isAvailable = inRangeQty >= offer.Quantity;
                                                const rowClass = isAvailable ? 'row-available' : '';
                                                
                                                const availableDisplay = inRangeQty > 0 ? `${inRangeQty}` : '-';
                                                const expensiveDisplay = outOfRangeQty > 0 ? outOfRangeQty : '-';
                                                
                                                return `
                                                <tr class="${rowClass}">
                                                    <td data-value="${offer.ItemName || 'N/A'}">${offer.ItemName || 'N/A'}</td>
                                                    <td data-value="${skillName}">${skillName}</td>
                                                    <td class="price align-right" data-value="${offer.Price}">${offer.Price.toFixed(2)} €</td>
                                                    <td class="quantity align-right" data-value="${offer.Quantity}">${offer.Quantity}</td>
                                                    <td class="align-right" data-value="${inRangeQty}">${availableDisplay}</td>
                                                    <td class="align-right" data-value="${outOfRangeQty}">${expensiveDisplay}</td>
                                                    <td class="price align-right" data-value="${offer.Price * offer.Quantity}">${(offer.Price * offer.Quantity).toFixed(2)} €</td>
                                                </tr>
                                            `}).join('')}
                                        </tbody>
                                    </table>
                                `;
                            }
                            
                            // Create research papers section
                            let papersHtml = '';
                            if (researchPapers.length > 0) {
                                // Calculate material requirements
                                const totalPapers = researchPapers.reduce((sum, offer) => sum + offer.Quantity, 0);
                                const paperNeeded = totalPapers * 20;
                                const inkNeeded = totalPapers * 4;
                                
                                papersHtml = `
                                    <h3 style="margin-top: 30px;">Research Papers (Modern)</h3>
                                    <div class="papers-summary">
                                        <h4>📝 Materials Required</h4>
                                        <p><strong>Paper needed:</strong> ${paperNeeded} (${totalPapers} papers × 20)</p>
                                        <p><strong>Ink needed:</strong> ${inkNeeded} (${totalPapers} papers × 4)</p>
                                    </div>
                                    <table class="offers-table" id="${papersTableId}">
                                        <thead>
                                            <tr>
                                                <th class="sortable" data-column="item" onclick="sortTable('${papersTableId}', 'item', this)">Research Paper</th>
                                                <th class="sortable align-right" data-column="price" onclick="sortTable('${papersTableId}', 'price', this)">Price</th>
                                                <th class="sortable align-right" data-column="quantity" onclick="sortTable('${papersTableId}', 'quantity', this)">Quantity</th>
                                                <th class="sortable align-right" data-column="available" onclick="sortTable('${papersTableId}', 'available', this)">Available</th>
                                                <th class="sortable align-right" data-column="expensive" onclick="sortTable('${papersTableId}', 'expensive', this)">Too Expensive</th>
                                                <th class="sortable align-right" data-column="volume" onclick="sortTable('${papersTableId}', 'volume', this)">Volume</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${researchPapers.map(offer => {
                                                const itemData = marketAvailability[offer.ItemName];
                                                
                                                let inRangeQty = 0;
                                                let outOfRangeQty = 0;
                                                
                                                if (itemData) {
                                                    const buyPrice = offer.Price;
                                                    const maxPrice = buyPrice * 1.2;
                                                    
                                                    itemData.byPrice.forEach(sellOffer => {
                                                        if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                                            inRangeQty += sellOffer.quantity;
                                                        } else if (sellOffer.price > maxPrice) {
                                                            outOfRangeQty += sellOffer.quantity;
                                                        }
                                                    });
                                                }
                                                
                                                const isAvailable = inRangeQty >= offer.Quantity;
                                                const rowClass = isAvailable ? 'row-available' : '';
                                                
                                                const availableDisplay = inRangeQty > 0 ? `${inRangeQty}` : '-';
                                                const expensiveDisplay = outOfRangeQty > 0 ? outOfRangeQty : '-';
                                                
                                                return `
                                                <tr class="${rowClass}">
                                                    <td data-value="${offer.ItemName || 'N/A'}">${offer.ItemName || 'N/A'}</td>
                                                    <td class="price align-right" data-value="${offer.Price}">${offer.Price.toFixed(2)} €</td>
                                                    <td class="quantity align-right" data-value="${offer.Quantity}">${offer.Quantity}</td>
                                                    <td class="align-right" data-value="${inRangeQty}">${availableDisplay}</td>
                                                    <td class="align-right" data-value="${outOfRangeQty}">${expensiveDisplay}</td>
                                                    <td class="price align-right" data-value="${offer.Price * offer.Quantity}">${(offer.Price * offer.Quantity).toFixed(2)} €</td>
                                                </tr>
                                            `}).join('')}
                                        </tbody>
                                    </table>
                                `;
                            }
                            
                            offersHtml = chartsHtml + regularTableHtml + papersHtml;
                            
                            // Store data for later chart creation
                            storeCard.dataset.chartId = chartId;
                            storeCard.dataset.skillVolumes = JSON.stringify(skillVolumes);
                            storeCard.dataset.papersChartId = papersChartId;
                            storeCard.dataset.paperVolumes = JSON.stringify(paperVolumes);
                            storeCard.dataset.hasRegularOffers = regularOffers.length > 0;
                            storeCard.dataset.hasPapers = researchPapers.length > 0;
                        }
                        
                        storeCard.innerHTML = `
                            <div class="store-header">
                                <div class="store-name">
                                    ${store.Name}
                                    <button class="copy-btn" onclick="copyToClipboard(event, this)">📋 Copy for Discord</button>
                                </div>
                                <div class="store-owner">Owner: ${store.Owner || 'Unknown'} ${store.Enabled ? '✅ Active' : '❌ Inactive'}</div>
                            </div>
                            ${offersHtml}
                        `;
                        
                        storesEl.appendChild(storeCard);
                        
                        // Create pie charts after DOM is updated
                        if (storeCard.dataset.hasRegularOffers === 'true') {
                            const chartId = storeCard.dataset.chartId;
                            const skillVolumes = JSON.parse(storeCard.dataset.skillVolumes);
                            createPieChart(chartId, skillVolumes);
                        }
                        
                        if (storeCard.dataset.hasPapers === 'true') {
                            const papersChartId = storeCard.dataset.papersChartId;
                            const paperVolumes = JSON.parse(storeCard.dataset.paperVolumes);
                            createPieChart(papersChartId, paperVolumes);
                        }
                    });
                }
                
                lastUpdateEl.textContent = `Last updated: ${new Date().toLocaleString('en-US')}`;
                if (DEBUG_MODE) console.log('✅ Data loaded successfully');
                
            } catch (error) {
                errorEl.style.display = 'block';
                errorEl.className = 'error';
                errorEl.textContent = `Error loading data: ${error.message}`;
                console.error('❌ Error:', error);
                
                if (DEBUG_MODE) {
                    debugInfoEl.style.display = 'block';
                    debugInfoEl.innerHTML = `
                        <div><span class="debug-label">❌ ERROR:</span></div>
                        <div>${error.message}</div>
                        <div>Check browser console (F12) for details</div>
                    `;
                }
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        // Load data on page load
        loadData();
        
        // Create pie chart using Chart.js
        function createPieChart(canvasId, skillVolumes) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            // Sort skills by volume (descending)
            const sortedSkills = Object.entries(skillVolumes)
                .sort((a, b) => b[1] - a[1])
                .map(entry => entry[0]);
            
            const volumes = sortedSkills.map(skill => skillVolumes[skill]);
            
            // Generate colors for each skill
            const colors = generateColors(sortedSkills.length);
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: sortedSkills,
                    datasets: [{
                        data: volumes,
                        backgroundColor: colors,
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                padding: 10,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${value.toFixed(2)} € (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Generate distinct colors for pie chart
        function generateColors(count) {
            const colors = [];
            const baseHues = [0, 30, 60, 120, 180, 210, 240, 270, 300, 330];
            
            for (let i = 0; i < count; i++) {
                const hue = baseHues[i % baseHues.length];
                const saturation = 70 - (Math.floor(i / baseHues.length) * 15);
                const lightness = 60 + (Math.floor(i / baseHues.length) * 5);
                colors.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }
            
            return colors;
        }
        
        // Copy store data to clipboard for Discord
        function copyToClipboard(event, buttonEl) {
            event.preventDefault();
            const storeCard = buttonEl.closest('.store-card');
            const storeName = storeCard.dataset.storeName;
            const offers = JSON.parse(storeCard.dataset.storeOffers);
            
            if (offers.length === 0) {
                alert('No offers to copy!');
                return;
            }
            
            // Build Discord-formatted message with code block
            let discordMessage = `**${storeName}** - Buying Offers:\n\`\`\`\n`;
            discordMessage += `${'Item'.padEnd(30)} | ${'Skill'.padEnd(20)} | ${'Price'.padEnd(10)} | ${'Qty'.padEnd(6)} | Volume\n`;
            discordMessage += `${'-'.repeat(30)} | ${'-'.repeat(20)} | ${'-'.repeat(10)} | ${'-'.repeat(6)} | ${'-'.repeat(10)}\n`;
            
            offers.forEach(offer => {
                const itemName = (offer.ItemName || 'N/A').padEnd(30);
                const skillName = (offer.Skill || 'N/A').padEnd(20);
                const price = (offer.Price.toFixed(2) + ' €').padEnd(10);
                const quantity = offer.Quantity.toString().padEnd(6);
                const volume = (offer.Price * offer.Quantity).toFixed(2) + ' €';
                discordMessage += `${itemName} | ${skillName} | ${price} | ${quantity} | ${volume}\n`;
            });
            
            discordMessage += `\`\`\``;
            
            // Copy to clipboard
            navigator.clipboard.writeText(discordMessage).then(() => {
                const originalText = buttonEl.textContent;
                buttonEl.textContent = '✅ Copied!';
                buttonEl.classList.add('copied');
                
                setTimeout(() => {
                    buttonEl.textContent = originalText;
                    buttonEl.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard. Please check browser permissions.');
            });
        }
        
        // Sort table by column
        const tableSortStates = {};
        
        function sortTable(tableId, column, headerEl) {
            const table = document.getElementById(tableId);
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            // Initialize sort state for this table
            if (!tableSortStates[tableId]) {
                tableSortStates[tableId] = {};
            }
            
            // Determine sort direction
            const currentDirection = tableSortStates[tableId][column] || 'none';
            const newDirection = currentDirection === 'asc' ? 'desc' : 'asc';
            tableSortStates[tableId][column] = newDirection;
            
            // Remove all sort indicators
            table.querySelectorAll('th').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
            });
            
            // Add sort indicator to current header
            headerEl.classList.add(newDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
            
            // Sort rows
            rows.sort((a, b) => {
                const aCell = a.querySelector(`td[data-value]:nth-child(${getColumnIndex(column)})`);
                const bCell = b.querySelector(`td[data-value]:nth-child(${getColumnIndex(column)})`);
                
                const aValue = aCell.dataset.value;
                const bValue = bCell.dataset.value;
                
                let comparison = 0;
                
                // Numeric comparison for price, quantity, volume
                if (column === 'price' || column === 'quantity' || column === 'volume') {
                    comparison = parseFloat(aValue) - parseFloat(bValue);
                } else {
                    // String comparison for item
                    comparison = aValue.localeCompare(bValue);
                }
                
                return newDirection === 'asc' ? comparison : -comparison;
            });
            
            // Reorder rows in DOM
            rows.forEach(row => tbody.appendChild(row));
        }
        
        function getColumnIndex(column) {
            const columnMap = {
                'item': 1,
                'skill': 2,
                'price': 3,
                'quantity': 4,
                'available': 5,
                'expensive': 6,
                'volume': 7
            };
            return columnMap[column];
        }
        
        // Optional: Auto-refresh every 30 seconds
        // setInterval(loadData, 30000);
    </script>
</body>
