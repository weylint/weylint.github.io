<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[White Tiger] Law</title>
  <script src="nav.js?v=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.7;
      min-height: 100vh;
    }

    header {
      max-width: 780px;
      margin: 20px auto;
      padding: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    header h1 {
      color: #58a6ff;
      font-size: 1.1rem;
      font-weight: normal;
      margin-bottom: 6px;
    }

    header .meta {
      font-size: 0.8rem;
      color: #8b949e;
    }

    #doc-content {
      max-width: 780px;
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: #6e7681;
    }

    .loading .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #doc-content h1,
    #doc-content h2,
    #doc-content h3,
    #doc-content h4 {
      color: #c9d1d9;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    #doc-content h1 { color: #58a6ff; font-size: 1.4rem; }
    #doc-content h2 { font-size: 1.15rem; border-bottom: 1px solid #30363d; padding-bottom: 0.4rem; }
    #doc-content h3 { font-size: 1rem; color: #8b949e; }
    #doc-content h4 { font-size: 0.95rem; color: #8b949e; }

    #doc-content p {
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    #doc-content ul, #doc-content ol {
      margin-bottom: 1rem;
      padding-left: 1.6rem;
    }

    #doc-content li {
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }

    #doc-content a {
      color: #58a6ff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.875rem;
    }

    #doc-content th, #doc-content td {
      border: 1px solid #21262d;
      padding: 0.6rem 0.8rem;
      text-align: left;
    }

    #doc-content th {
      background: #0d1117;
      color: #8b949e;
      font-weight: normal;
    }

    #doc-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1rem 0;
    }

    #doc-content hr {
      border: none;
      border-top: 1px solid #30363d;
      margin: 2rem 0;
    }

    #doc-content sup {
      vertical-align: super;
      font-size: 0.75em;
      line-height: 0;
    }

    .error-msg {
      background: #0d1117;
      border: 1px solid #6e3030;
      border-radius: 8px;
      padding: 1.5rem;
      color: #f85149;
      text-align: center;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .error-msg code {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #8b949e;
      word-break: break-all;
    }

    footer {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
      border-top: 1px solid #30363d;
      text-align: center;
      font-size: 0.8rem;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="doc-title">[White Tiger] Law</h1>
    <div class="meta" id="last-updated">Loading&hellip;</div>
  </header>

  <div id="doc-content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading document&hellip;</p>
    </div>
  </div>

  <footer>
    Synced from wt-law repository
  </footer>

  <script>
    const BASE = 'https://weylint.github.io/wt-law/';
    const DOCS = {
        'server-rules': { file: 'server-rules.md', title: 'Server Rules' },
        'constitution':  { file: 'constitution.md',  title: 'Constitution' },
        'federal-law':   { file: 'federal-law.md',   title: 'Federal Law' },
    };
    const DEFAULT_DOC = 'constitution';

    (async () => {
        const container = document.getElementById('doc-content');
        const updatedEl = document.getElementById('last-updated');
        const titleEl   = document.getElementById('doc-title');

        const key = new URLSearchParams(window.location.search).get('doc') || DEFAULT_DOC;
        const doc = DOCS[key] || DOCS[DEFAULT_DOC];
        const fullTitle = '[White Tiger] ' + doc.title;

        document.title = fullTitle;
        titleEl.textContent = fullTitle;

        try {
            const res = await fetch(BASE + doc.file);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            container.innerHTML = marked.parse(text);
            updatedEl.textContent = `Last loaded: ${new Date().toLocaleString()}`;
        } catch (err) {
            container.innerHTML = `
                <div class="error-msg">
                    <strong>Could not load the document.</strong><br>
                    <code>${err.message}</code>
                </div>
            `;
            updatedEl.textContent = 'Failed to load';
        }
    })();
  </script>
</body>
</html>
