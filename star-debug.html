<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Debug - White Tiger</title>
    <script src="nav.js?v=2"></script>
    <script src="star-algo.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        header {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 6px;
        }

        header > p {
            color: #8b949e;
            font-size: 0.875rem;
        }

        .inputs-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 220px;
        }

        .input-group label {
            color: #8b949e;
            font-size: 0.78rem;
        }

        .input-group input {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 10px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 0.875rem;
            width: 100%;
        }

        .input-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .input-hint {
            color: #6e7681;
            font-size: 0.72rem;
        }

        .params-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .params-card h2 {
            color: #8b949e;
            font-size: 0.8rem;
            font-weight: normal;
            margin-bottom: 12px;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .param-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-item label {
            color: #6e7681;
            font-size: 0.72rem;
        }

        .param-item input {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 4px;
            padding: 6px 8px;
            color: #8b949e;
            font-family: inherit;
            font-size: 0.8rem;
            width: 100%;
        }

        .param-item input:focus {
            outline: none;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .table-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-card h2 {
            color: #c9d1d9;
            font-size: 0.9rem;
            font-weight: normal;
            padding: 14px 16px;
            border-bottom: 1px solid #30363d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead th {
            background: #0d1117;
            color: #8b949e;
            font-weight: normal;
            text-align: right;
            padding: 8px 14px;
            border-bottom: 1px solid #21262d;
        }

        thead th:first-child { text-align: center; }

        tbody tr {
            border-bottom: 1px solid #21262d;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: #1c2128; }

        tbody tr.current-row { background: #58a6ff0d; }
        tbody tr.current-row:hover { background: #58a6ff18; }

        tbody td {
            padding: 7px 14px;
            text-align: right;
        }

        tbody td:first-child {
            text-align: center;
            color: #6e7681;
            font-size: 0.78rem;
        }

        .td-xp         { color: #c9d1d9; }
        .td-remaining  { color: #3fb950; }
        .td-partial    { color: #e3b341; }
        .td-cumulative { color: #58a6ff; }

        .arrow-current {
            color: #58a6ff;
            font-size: 0.75rem;
            margin-right: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Star Debug</h1>
            <p>Raw XP cost per star level for formula verification.</p>
        </header>

        <div class="inputs-card">
            <div class="input-group">
                <label>Current Level (stars)</label>
                <input type="number" id="current-level" value="1" min="1" step="1" placeholder="e.g. 9.5">
                <span class="input-hint">1 = start of 1★, 1.5 = halfway through 1★</span>
            </div>
        </div>

        <div class="params-card">
            <h2>Formula parameters <span style="color:#6e7681;font-size:0.75em">(don't touch, unless you know what you're doing)</span></h2>
            <div class="params-grid">
                <div class="param-item">
                    <label>Experience Difficulty Modifier</label>
                    <input type="number" id="p-edm" step="1">
                </div>
                <div class="param-item">
                    <label>Percent Multiplier (%)</label>
                    <input type="number" id="p-pm" step="1">
                </div>
                <div class="param-item">
                    <label>Base Cost</label>
                    <input type="number" id="p-bc" step="1">
                </div>
                <div class="param-item">
                    <label>Stars Required per Stage</label>
                    <input type="number" id="p-srps" step="1" min="1">
                </div>
                <div class="param-item">
                    <label>Experience Increased Additive</label>
                    <input type="number" id="p-eia" step="1">
                </div>
            </div>
        </div>

        <div class="table-card">
            <h2>XP per level</h2>
            <table>
                <thead>
                    <tr>
                        <th>Level</th>
                        <th>XP for stage</th>
                        <th>Remaining in stage</th>
                        <th>Cumulative remaining</th>
                    </tr>
                </thead>
                <tbody id="xp-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const MAX_STAGES = 40;

        function loadFromUrl() {
            const p = new URLSearchParams(location.search);
            if (p.has('level')) document.getElementById('current-level').value = p.get('level');
        }

        function updateUrl() {
            const level = document.getElementById('current-level').value;
            const p = new URLSearchParams();
            if (level) p.set('level', level);
            const qs = p.toString();
            history.replaceState(null, '', qs ? '?' + qs : location.pathname);
        }

        function render() {
            updateUrl();

            const p = StarAlgo.getParams();
            const currentLevel       = Math.max(1, parseFloat(document.getElementById('current-level').value) || 1);
            const internalLevel      = currentLevel - 1;
            const currentStage       = Math.floor(internalLevel);
            const progress           = internalLevel - currentStage;
            const xpTable            = StarAlgo.buildXpTable(p, MAX_STAGES);
            const remainingInCurrent = (1 - progress) * xpTable[currentStage];

            const tbody = document.getElementById('xp-table-body');
            let rows = '';
            let cumulative = 0;

            for (let x = currentStage; x < MAX_STAGES; x++) {
                const xpForStage     = xpTable[x];
                const isCurrentStage = x === currentStage;
                const remaining      = isCurrentStage ? remainingInCurrent : xpForStage;

                cumulative += remaining;

                const arrow       = isCurrentStage ? `<span class="arrow-current">▶</span>` : '';
                const remDisplay  = isCurrentStage && progress > 0
                    ? `<span class="td-partial">${remaining.toFixed(6)}</span>`
                    : `<span class="td-remaining">${remaining.toFixed(6)}</span>`;

                rows += `<tr class="${isCurrentStage ? 'current-row' : ''}">
                    <td>${arrow}${x + 1}★</td>
                    <td class="td-xp">${xpForStage.toFixed(6)}</td>
                    <td>${remDisplay}</td>
                    <td><span class="td-cumulative">${cumulative.toFixed(6)}</span></td>
                </tr>`;
            }

            tbody.innerHTML = rows;
        }

        document.querySelectorAll('input').forEach(el => el.addEventListener('input', render));

        const _d = StarAlgo.DEFAULTS;
        document.getElementById('p-edm').value  = _d.edm;
        document.getElementById('p-pm').value   = _d.pm;
        document.getElementById('p-bc').value   = _d.bc;
        document.getElementById('p-srps').value = _d.srps;
        document.getElementById('p-eia').value  = _d.eia;

        loadFromUrl();
        render();
    </script>
</body>
</html>
