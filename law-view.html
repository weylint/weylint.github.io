<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law - White Tiger</title>
    <script src="nav.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .law-header-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .law-header-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .law-name {
            color: #c9d1d9;
            font-size: 1rem;
        }

        .back-link {
            color: #6e7681;
            font-size: 0.8rem;
            text-decoration: none;
            margin-left: auto;
        }

        .back-link:hover { color: #8b949e; }

        .state-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid;
            font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
            flex-shrink: 0;
        }

        .law-creator {
            color: #6e7681;
            font-size: 0.8rem;
        }

        .error-banner {
            background: #0d1117;
            border: 1px solid #6e3030;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: #f85149;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #6e7681;
        }

        .loading .spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .law-user-desc {
            color: #c9d1d9;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .law-code-block {
            background: #0d1117;
            border-top: 1px solid #30363d;
            border-bottom: 1px solid #30363d;
            border-radius: 0;
            padding: 12px 0;
            /* Escape the 900px container */
            margin-left: calc(-20px - max(0px, (100vw - 260px - 900px) / 2));
            width: calc(100vw - 260px);
            font-size: 0.82rem;
            overflow-x: auto;
            color: #c9d1d9;
        }

        /* Eco markup styles */
        .eco-header {
            color: #58a6ff;
            font-size: 0.875rem;
            font-weight: bold;
            margin: 2rem 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #30363d;
        }

        .eco-header:first-child { margin-top: 0; }
        .eco-govt     { color: #e3b341; }
        .eco-currency { color: #3fb950; }
        .eco-bank     { color: #58a6ff; }
        .eco-positive { color: #3fb950; }

        .eco-foldout {
            position: relative;
            display: inline-block;
        }

        .eco-foldout-label {
            color: #58a6ff;
            font-size: 0.8em;
            border-bottom: 1px dotted #58a6ff;
            cursor: default;
        }

        .eco-foldout-tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            z-index: 100;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 12px;
            min-width: 400px;
            max-width: 700px;
            font-size: 0.8rem;
            color: #8b949e;
            line-height: 1.8;
            white-space: normal;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        .eco-foldout:hover .eco-foldout-tooltip {
            display: block;
        }

        .eco-line         { display: flex; line-height: 1.7; padding-right: 16px; }
        .eco-line-block   { margin-top: 0.8em; }
        .eco-ln-wrap      { flex-shrink: 0; width: 40px; }
        .eco-ln           { color: #6e7681; font-size: 0.78em; display: block; text-align: right;
                            padding-right: 12px; user-select: none; padding-top: 1px;
                            border-right: 1px solid #21262d; }
        .eco-ln-empty     { color: transparent; border-right: 1px solid #21262d; }
        .eco-lc           { flex: 1; margin-left: 14px; }
        .eco-spacer       { height: 0.4em; }

        .eco-kw-event { color: #c586c0; }
        .eco-kw-then  { color: #4ec9b0; }
        .eco-kw-cond  { color: #c586c0; }
        .eco-kw-op    { color: #569cd6; }

        .eco-chip {
            display: inline-block;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 3px;
            padding: 1px 6px;
            font-size: 0.8em;
            color: #c9d1d9;
            margin: 0 1px;
            vertical-align: middle;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="error-banner" class="error-banner"></div>
        <div id="law-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading&hellip;</p>
            </div>
        </div>
    </div>

    <script>
        function stateColor(state) {
            if (state === 'Active')   return '#3fb950';
            if (state === 'Proposed') return '#e3b341';
            return '#6e7681';
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function formatEcoText(raw) {
            if (!raw) return '';
            let s = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            let prev;
            let passes = 0;
            do {
                prev = s;
                s = s
                    .replace(/<foldout><linktext>([\s\S]*?)<\/linktext><title>[\s\S]*?<\/title>([\s\S]*?)<\/foldout>/g,
                        (_, sum, body) => `<span class="eco-foldout"><span class="eco-foldout-label">${sum}</span><span class="eco-foldout-tooltip">${body.trim().replace(/\n/g, '<br>')}</span></span>`)
                    .replace(/<link="[^"]*"><icon[^>]*><color=#([0-9A-Fa-f]{6})[0-9A-Fa-f]{0,2}>([\s\S]*?)<\/color><\/icon><\/link>/g,
                        (_, rgb, text) => `<span class="eco-chip" style="color:#${rgb}">${text}</span>`)
                    .replace(/<link="[^"]*"><icon[^>]*>([\s\S]*?)<\/icon><\/link>/g,
                        (_, text) => `<span class="eco-chip">${text}</span>`)
                    .replace(/<link="[^"]*">([\s\S]*?)<\/link>/g, '$1')
                    .replace(/<icon[^>]*>([\s\S]*?)<\/icon>/g, '$1')
                    .replace(/<style="Header">([\s\S]*?)<\/style>/g, '<div class="eco-header">$1</div>')
                    .replace(/<style="Government">([\s\S]*?)<\/style>/g, '<span class="eco-govt">$1</span>')
                    .replace(/<style="Currency">([\s\S]*?)<\/style>/g, '<span class="eco-currency">$1</span>')
                    .replace(/<style="BankAccount">([\s\S]*?)<\/style>/g, '<span class="eco-bank">$1</span>')
                    .replace(/<style="Positive">([\s\S]*?)<\/style>/g, '<span class="eco-positive">$1</span>')
                    .replace(/<style="[^"]*">([\s\S]*?)<\/style>/g, '$1');
            } while (s !== prev && ++passes < 10);

            s = s.replace(/<color=#([0-9A-Fa-f]{6})[0-9A-Fa-f]{0,2}>/g, '<span style="color:#$1">');
            s = s.replace(/<\/color>/g, '</span>');

            s = s.replace(/<i>([\s\S]*?)<\/i>/g, (_, c) => `<i>${c.replace(/\n/g, '<br>')}</i>`);

            const savedIBlocks = [];
            s = s.replace(/<i>[\s\S]*?<\/i>/gi, m => { savedIBlocks.push(m); return `\x00I${savedIBlocks.length - 1}\x00`; });

            s = s.replace(/\bthen\s+if\b/gi, 'then\nif');
            s = s.replace(/([^\n]+?)(if)(?=[ \t])/gi, '$1\nif');
            s = s.replace(/\belse\s*\n\s*if\b/gi, 'else if');
            s = s.replace(/\band\s*\n\s*if\b/gi, 'and if');

            s = s.replace(/\x00I(\d+)\x00/g, (_, i) => savedIBlocks[+i]);

            let lineNum = 0;
            let depth = 0;
            let lastKw = 'on';

            const htmlLines = s.split('\n').map(line => {
                const trimmed = line.trimStart();
                if (!trimmed) return '<div class="eco-spacer"></div>';
                if (trimmed.startsWith('<div class="eco-header">')) { depth = 0; return trimmed; }

                const kw =
                    /^on\s+(event|every)\b/i.test(trimmed) ? 'on'     :
                    /^else\s+if\b/i.test(trimmed)          ? 'elseif' :
                    /^and\s+if\b/i.test(trimmed)           ? 'andif'  :
                    /^else\b/i.test(trimmed)               ? 'else'   :
                    /^if\b/i.test(trimmed)                 ? 'if'     :
                    /^then\b/i.test(trimmed)               ? 'then'   :
                    /^(and|or|not)\b/i.test(trimmed)       ? 'andor'  :
                    null;

                if      (kw === 'on')                                { depth = 0; }
                else if (kw === 'if')                                { depth = lastKw === 'then' ? depth + 1 : 1; }
                else if (kw === 'then')                              { depth = depth + 1; }
                else if (kw === 'andif' || kw === 'elseif' || kw === 'else') { depth = 1; }
                if (trimmed.startsWith('<div class="eco-header">')) depth = 0;

                if (kw) lastKw = kw === 'andif' ? 'if' : kw;

                const isIndented = line.length > trimmed.length;
                const showLineNum = kw !== null || isIndented;
                if (showLineNum) lineNum++;

                const content = trimmed
                    .replace(/^(on\s+event|on\s+every)\b/i,  '<span class="eco-kw-event">$1</span>')
                    .replace(/^(then)\b/i,                    '<span class="eco-kw-then">$1</span>')
                    .replace(/^(else\s+if|and\s+if|if)\b/i,   '<span class="eco-kw-cond">$1</span>')
                    .replace(/^(else)\b/i,                    '<span class="eco-kw-cond">$1</span>')
                    .replace(/^(and|or|not)\b/i,              '<span class="eco-kw-op">$1</span>');

                const lnHtml = showLineNum
                    ? `<span class="eco-ln">${lineNum}</span>`
                    : `<span class="eco-ln eco-ln-empty"></span>`;

                const blockClass = (kw === 'on' || kw === 'elseif' || kw === 'else') ? ' eco-line-block' : '';
                const displayDepth = (isIndented && depth === 0) ? 1 : depth;
                const indent = displayDepth * 1.5;

                return `<div class="eco-line${blockClass}"><span class="eco-ln-wrap">${lnHtml}</span><span class="eco-lc" style="padding-left:${indent}em">${content}</span></div>`;
            });
            return htmlLines.join('\n');
        }

        async function main() {
            const container = document.getElementById('law-container');
            const banner    = document.getElementById('error-banner');

            const id = new URLSearchParams(location.search).get('id');
            if (!id) {
                banner.textContent = 'No law ID specified. Use ?id=XXXXX in the URL.';
                banner.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(`https://white-tiger.play.eco/api/v1/laws/${id}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const law = await res.json();

                document.title = `${law.Name} - White Tiger`;

                const color = stateColor(law.State);
                const badge = `<span class="state-badge" style="color:${color};border-color:${color}22;background:${color}11">${escapeHtml(law.State)}</span>`;

                const userDesc = law.UserDescription
                    ? `<div class="law-user-desc">${formatEcoText(law.UserDescription)}</div>`
                    : '';

                const codeBlock = law.Description
                    ? `<div class="law-code-block">${formatEcoText(law.Description)}</div>`
                    : '';

                container.innerHTML = `
                    <div class="law-header-card">
                        <div class="law-header-row">
                            ${badge}
                            <span class="law-name">${escapeHtml(law.Name)}</span>
                            <a class="back-link" href="laws.html">&larr; All Laws</a>
                        </div>
                        <div class="law-creator">by ${escapeHtml(law.Creator)}</div>
                    </div>
                    ${userDesc}
                    ${codeBlock}
                `;
            } catch (err) {
                banner.textContent = `Could not load law: ${err.message}`;
                banner.style.display = 'block';
                container.innerHTML = '';
            }
        }

        main();
    </script>
</body>
</html>
