<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transport Profits — White Tiger</title>
  <script src="nav.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    header {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1 { color: #58a6ff; font-size: 1.5rem; margin-bottom: 6px; }
    header > p { color: #8b949e; font-size: 0.875rem; margin-bottom: 14px; }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .controls label { color: #8b949e; font-size: 0.875rem; display: flex; align-items: center; gap: 6px; }

    select {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
    }

    select:focus { outline: 2px solid #58a6ff; outline-offset: 1px; }

    #count-label { color: #8b949e; font-size: 0.8rem; }

    /* ── Collapsible sections in header ── */
    .header-section {
      margin-top: 14px;
      border-top: 1px solid #21262d;
      padding-top: 12px;
    }

    .header-section > summary {
      cursor: pointer;
      color: #8b949e;
      font-size: 0.8rem;
      list-style: none;
      user-select: none;
    }

    .header-section > summary::-webkit-details-marker { display: none; }
    .header-section > summary:hover { color: #c9d1d9; }

    /* ── Transport config panel ── */
    .config-body {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .config-group {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      align-items: flex-start;
    }

    .config-label {
      color: #6e7681;
      min-width: 70px;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .config-controls {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .config-info { color: #6e7681; padding-top: 4px; }

    .vehicle-row, .config-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8b949e;
    }

    input[type="text"], input[type="number"] {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 7px;
      font-family: inherit;
      font-size: 0.8rem;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      outline: 2px solid #58a6ff;
      outline-offset: 1px;
    }

    .v-name   { width: 90px; }
    .v-weight { width: 65px; text-align: right; }
    .v-slots  { width: 50px; text-align: right; }
    .bp-weight { width: 65px; text-align: right; }
    .bp-slots  { width: 50px; text-align: right; }

    .add-vehicle-btn, .remove-vehicle-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 3px;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 2px 7px;
      line-height: 1.5;
    }

    .add-vehicle-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .remove-vehicle-btn:hover { border-color: #f85149; color: #f85149; }

    /* ── Ignored orders section ── */
    #ignored-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ignored-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #8b949e;
    }

    .unignore-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 3px;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 1px 6px;
      line-height: 1.4;
    }

    .unignore-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* ── Status ── */
    #status {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px 20px;
      color: #8b949e;
      font-size: 0.9rem;
    }

    #status.error { color: #f85149; border-color: #6e3030; }

    /* ── Route sections ── */
    .route {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .route summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      gap: 12px;
    }

    .route summary::-webkit-details-marker { display: none; }
    .route summary:hover { background: #1c2128; }

    .route-title {
      font-size: 0.9rem;
      color: #c9d1d9;
      flex: 1;
      min-width: 0;
    }

    .route-title .arrow { color: #58a6ff; margin: 0 6px; }
    .route-store { color: #e6edf3; font-weight: bold; }

    .route-profit { font-size: 0.85rem; color: #3fb950; white-space: nowrap; }
    .route-profit.zero { color: #6e7681; }

    .collapse-icon {
      color: #6e7681;
      font-size: 0.75rem;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    details[open] .collapse-icon { transform: rotate(90deg); }

    /* ── Capacity summary bar ── */
    .route-capacity {
      padding: 4px 16px;
      font-size: 0.76rem;
      color: #6e7681;
      background: #0d1117;
    }

    /* ── Item table ── */
    .item-table-wrap {
      overflow-x: auto;
      border-top: 1px solid #30363d;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      table-layout: fixed;
    }

    th {
      background: #0d1117;
      color: #8b949e;
      text-align: left;
      padding: 7px 12px;
      white-space: nowrap;
      font-weight: normal;
    }

    td {
      padding: 6px 12px;
      border-top: 1px solid #21262d;
      white-space: nowrap;
    }

    tr.break-even td { opacity: 0.45; }

    td.num { text-align: right; }
    th.num { text-align: right; }

    td.profit-val  { color: #3fb950; }
    td.profit-zero { color: #6e7681; }

    .break-even-badge {
      display: inline-block;
      font-size: 0.7rem;
      background: #21262d;
      color: #6e7681;
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Ignore button inside table rows ── */
    th.ignore-col { width: 28px; padding: 7px 8px; }
    td.ignore-col { padding: 4px 8px; text-align: center; }

    .ignore-btn {
      background: none;
      border: none;
      color: #3d444d;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .ignore-btn:hover { color: #f85149; background: #2a1a1a; }

    #routes-container { margin-top: 4px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Transport Profits</h1>
    <p>Buy low from one store, sell high to another. Routes sorted by total profit.</p>
    <div class="controls">
      <label>
        Show top
        <select id="topN">
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="0">All</option>
        </select>
        routes
      </label>
      <span id="count-label"></span>
    </div>

    <details id="config-section" class="header-section">
      <summary>&#9881; Transport settings</summary>
      <div class="config-body">
        <div class="config-group">
          <span class="config-label">Vehicles</span>
          <div class="config-controls">
            <div id="vehicle-list"></div>
            <button id="add-vehicle-btn" class="add-vehicle-btn">+ Add vehicle</button>
          </div>
        </div>
        <div class="config-group">
          <span class="config-label">Backpack</span>
          <div class="config-inline">
            <input type="number" id="backpack-weight" class="bp-weight" value="25" min="0" step="1" title="Backpack weight limit (kg)">
            <span>kg</span>
            <input type="number" id="backpack-slots" class="bp-slots" value="16" min="0" step="1" title="Backpack slot count">
            <span>slots</span>
          </div>
        </div>
        <div class="config-group">
          <span class="config-label">Hands</span>
          <span class="config-info">1 slot &middot; no weight limit &middot; IsCarried items only</span>
        </div>
      </div>
    </details>

    <details id="ignored-section" class="header-section" style="display:none">
      <summary id="ignored-summary">Ignored buy orders (0)</summary>
      <div id="ignored-list"></div>
    </details>
  </header>

  <div id="status">Loading store data&hellip;</div>
  <div id="routes-container"></div>
</div>

<script src="white-tiger-api.js"></script>
<script src="transport-algo.js"></script>
<script src="eco-render.js"></script>
<script>
  const esc = EcoRender.esc;

  const statusEl       = document.getElementById('status');
  const routesEl       = document.getElementById('routes-container');
  const topNSelect     = document.getElementById('topN');
  const countLabel     = document.getElementById('count-label');
  const ignoredSection = document.getElementById('ignored-section');
  const ignoredSummary = document.getElementById('ignored-summary');
  const ignoredListEl  = document.getElementById('ignored-list');
  const configSection  = document.getElementById('config-section');
  const vehicleListEl  = document.getElementById('vehicle-list');

  // ── Transport config ───────────────────────────────────────────────────────

  let itemData = {};

  let transportConfig = {
    vehicles: [{ name: 'Truck', slots: 36, weightG: 8_000_000 }],
    backpack:  { slots: 16, weightG: 25_000 },
    hands:     { slots: 1 },
  };

  function renderConfig() {
    vehicleListEl.innerHTML = '';
    transportConfig.vehicles.forEach((v, i) => {
      const row = document.createElement('div');
      row.className = 'vehicle-row';
      row.dataset.idx = i;
      row.innerHTML = `
        <input type="text"   class="v-name"   value="${esc(v.name)}" placeholder="Name">
        <input type="number" class="v-weight" value="${v.weightG / 1000}" min="0" step="100" title="Weight limit (kg)">
        <span>kg</span>
        <input type="number" class="v-slots"  value="${v.slots}" min="0" step="1" title="Slot count">
        <span>slots</span>
        <button class="remove-vehicle-btn" title="Remove vehicle">&times;</button>
      `;
      vehicleListEl.appendChild(row);
    });
  }

  configSection.addEventListener('change', e => {
    const row = e.target.closest('.vehicle-row');
    if (row) {
      const idx = parseInt(row.dataset.idx, 10);
      if (e.target.classList.contains('v-name'))
        transportConfig.vehicles[idx].name = e.target.value;
      if (e.target.classList.contains('v-weight'))
        transportConfig.vehicles[idx].weightG = (parseFloat(e.target.value) || 0) * 1000;
      if (e.target.classList.contains('v-slots'))
        transportConfig.vehicles[idx].slots = parseInt(e.target.value, 10) || 0;
      recompute();
      return;
    }
    if (e.target.id === 'backpack-weight') {
      transportConfig.backpack.weightG = (parseFloat(e.target.value) || 0) * 1000;
      recompute();
    }
    if (e.target.id === 'backpack-slots') {
      transportConfig.backpack.slots = parseInt(e.target.value, 10) || 0;
      recompute();
    }
  });

  configSection.addEventListener('click', e => {
    if (e.target.classList.contains('remove-vehicle-btn')) {
      const row = e.target.closest('.vehicle-row');
      transportConfig.vehicles.splice(parseInt(row.dataset.idx, 10), 1);
      renderConfig();
      recompute();
      return;
    }
    if (e.target.id === 'add-vehicle-btn') {
      transportConfig.vehicles.push({ name: '', slots: 36, weightG: 8_000_000 });
      renderConfig();
      recompute();
    }
  });

  // ── Ignored buy orders ────────────────────────────────────────────────────
  // A buy order is identified by "storeName|||itemName|||price".
  // Ignoring one removes it from ALL route calculations, not just one pair.

  const STORAGE_KEY = 'wt-transport-ignored-buys';
  let ignoredBuys = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let rawStores   = [];
  let allRoutes   = [];

  function ignoredKey(storeName, itemName, price) {
    return `${storeName}|||${itemName}|||${price}`;
  }

  function saveIgnored() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...ignoredBuys]));
  }

  // Strip ignored buy offers from raw stores before passing to the algorithm.
  function filterStores(stores) {
    if (ignoredBuys.size === 0) return stores;
    return stores.map(store => ({
      ...store,
      AllOffers: (store.AllOffers || []).filter(offer =>
        !offer.Buying || !ignoredBuys.has(ignoredKey(store.Name, offer.ItemName, offer.Price))
      ),
    }));
  }

  function recompute() {
    allRoutes = TransportAlgo.compute(filterStores(rawStores), itemData, transportConfig);
    renderRoutes();
    renderIgnored();
  }

  // ── Ignored list UI ───────────────────────────────────────────────────────

  function renderIgnored() {
    if (ignoredBuys.size === 0) {
      ignoredSection.style.display = 'none';
      return;
    }
    ignoredSection.style.display = '';
    ignoredSummary.textContent = `Ignored buy orders (${ignoredBuys.size})`;
    ignoredListEl.innerHTML = '';
    for (const key of [...ignoredBuys].sort()) {
      const [storeName, itemName, price] = key.split('|||');
      const entry = document.createElement('div');
      entry.className = 'ignored-entry';
      const btn = document.createElement('button');
      btn.className = 'unignore-btn';
      btn.dataset.key = key;
      btn.textContent = 'restore';
      const label = document.createElement('span');
      label.innerHTML = `${EcoRender.storeNameHTML(storeName)} buying ${esc(itemName)} @ ${fmt(parseFloat(price))}`;
      entry.appendChild(btn);
      entry.appendChild(label);
      ignoredListEl.appendChild(entry);
    }
  }

  ignoredListEl.addEventListener('click', e => {
    const btn = e.target.closest('.unignore-btn');
    if (!btn) return;
    ignoredBuys.delete(btn.dataset.key);
    saveIgnored();
    recompute();
  });

  // ── Formatting ────────────────────────────────────────────────────────────

  function fmt(n) {
    return '\u20ac\u202f' + n.toFixed(2);
  }

  // ── Route rendering ───────────────────────────────────────────────────────

  function renderRoutes() {
    routesEl.innerHTML = '';

    const hasItemData = Object.keys(itemData).length > 0;
    const totalVehicleSlots = transportConfig.vehicles.reduce((s, v) => s + v.slots, 0);

    const topN   = parseInt(topNSelect.value, 10);
    const total  = allRoutes.length;
    const shown  = topN === 0 ? total : Math.min(topN, total);
    const routes = allRoutes.slice(0, shown);

    countLabel.textContent = `Showing ${shown} of ${total} route${total !== 1 ? 's' : ''}`;

    for (const route of routes) {
      const details = document.createElement('details');
      details.open = true;
      details.className = 'route';

      const summary = document.createElement('summary');
      const profitIsZero = route.totalProfit === 0;
      summary.innerHTML = `
        <span class="route-title">
          Buy from: <span class="route-store">${EcoRender.storeNameHTML(route.sellStore)}</span>
          <span class="arrow">&rarr;</span>
          Sell to: <span class="route-store">${EcoRender.storeNameHTML(route.buyStore)}</span>
        </span>
        <span class="route-profit${profitIsZero ? ' zero' : ''}">
          ${profitIsZero ? 'break-even' : fmt(route.totalProfit) + ' profit'}
        </span>
        <span class="collapse-icon">&#9654;</span>
      `;
      details.appendChild(summary);

      // ── Capacity summary bar ────────────────────────────────────────────
      if (hasItemData) {
        const totalWeightG = route.items.reduce((sum, it) => {
          const d = itemData[it.itemName];
          return sum + (d ? it.qty * d.weightG : 0);
        }, 0);

        const vehicleSlotsUsed = route.items.reduce((sum, it) => {
          const d = itemData[it.itemName];
          return sum + (d && it.vehicleQty > 0 ? Math.ceil(it.vehicleQty / d.maxStackSize) : 0);
        }, 0);

        const backpackSlotsUsed = route.items.reduce((sum, it) => {
          const d = itemData[it.itemName];
          return sum + (d && it.backpackQty > 0 ? Math.ceil(it.backpackQty / d.maxStackSize) : 0);
        }, 0);

        const handsUsed = route.items.reduce((sum, it) => sum + (it.handsQty > 0 ? 1 : 0), 0);

        const kg = totalWeightG / 1000;
        const weightStr = kg >= 1000
          ? (kg / 1000).toFixed(2) + ' t'
          : kg.toFixed(1) + ' kg';

        const parts = ['\u2696 ' + weightStr];
        if (totalVehicleSlots > 0)
          parts.push(`Vehicle ${vehicleSlotsUsed}/${totalVehicleSlots} slots`);
        if (transportConfig.backpack.slots > 0)
          parts.push(`Backpack ${backpackSlotsUsed}/${transportConfig.backpack.slots} slots`);
        if (handsUsed > 0)
          parts.push(`Hands ${handsUsed}/1`);

        const capDiv = document.createElement('div');
        capDiv.className = 'route-capacity';
        capDiv.textContent = parts.join('  \u00b7  ');
        details.appendChild(capDiv);
      }

      // ── Item table ──────────────────────────────────────────────────────
      const wrap  = document.createElement('div');
      wrap.className = 'item-table-wrap';

      const table = document.createElement('table');
      table.innerHTML = `
        <colgroup>
          <col style="width:28px">
          <col>
          <col style="width:90px">
          <col style="width:90px">
          <col style="width:90px">
          <col style="width:55px">
          ${hasItemData ? '<col style="width:72px"><col style="width:60px">' : ''}
          <col style="width:100px">
        </colgroup>
        <thead><tr>
          <th class="ignore-col"></th>
          <th>Item</th>
          <th class="num">Buy price</th>
          <th class="num">Sell price</th>
          <th class="num">Profit/unit</th>
          <th class="num">Qty</th>
          ${hasItemData ? '<th class="num">kg/unit</th><th class="num">Stacks</th>' : ''}
          <th class="num">Total profit</th>
        </tr></thead>`;

      const tbody = document.createElement('tbody');
      for (const item of route.items) {
        const breakEven = item.profitPerUnit === 0;
        const key = ignoredKey(route.buyStore, item.itemName, item.buyPrice);
        const d   = itemData[item.itemName];

        const kgPerUnit = d && d.weightG > 0 ? (d.weightG / 1000).toFixed(3) : '';
        const stacks    = d && item.qty > 0  ? Math.ceil(item.qty / Math.max(1, d.maxStackSize)) : '';

        const tr = document.createElement('tr');
        if (breakEven) tr.className = 'break-even';
        tr.innerHTML = `
          <td class="ignore-col">
            <button class="ignore-btn" data-key="${esc(key)}" title="Ignore this buy order everywhere">&times;</button>
          </td>
          <td>${esc(item.itemName)}${breakEven ? '<span class="break-even-badge">break-even</span>' : ''}</td>
          <td class="num">${fmt(item.sellPrice)}</td>
          <td class="num">${fmt(item.buyPrice)}</td>
          <td class="num ${breakEven ? 'profit-zero' : 'profit-val'}">${fmt(item.profitPerUnit)}</td>
          <td class="num">${item.qty}</td>
          ${hasItemData ? `<td class="num">${esc(String(kgPerUnit))}</td><td class="num">${esc(String(stacks))}</td>` : ''}
          <td class="num ${breakEven ? 'profit-zero' : 'profit-val'}">${fmt(item.totalProfit)}</td>
        `;
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      wrap.appendChild(table);
      details.appendChild(wrap);
      routesEl.appendChild(details);
    }

    if (routes.length === 0) {
      routesEl.innerHTML = '<div id="status">No profitable routes found.</div>';
    }
  }

  // Event delegation — one listener handles all ignore buttons across all rendered routes.
  routesEl.addEventListener('click', e => {
    const btn = e.target.closest('.ignore-btn');
    if (!btn) return;
    ignoredBuys.add(btn.dataset.key);
    saveIgnored();
    recompute();
  });

  topNSelect.addEventListener('change', renderRoutes);

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    try {
      const [storesData, itemsData] = await Promise.all([
        WhiteTigerAPI.fetchStores(),
        WhiteTigerAPI.fetchAllItems().catch(() => null),
      ]);

      rawStores = Array.isArray(storesData?.Stores) ? storesData.Stores : [];

      if (itemsData?.AllItems) {
        for (const [name, item] of Object.entries(itemsData.AllItems)) {
          const p = item.PropertyInfos;
          itemData[name] = {
            weightG:      parseInt(p.Weight?.Int32      ?? 0),
            maxStackSize: parseInt(p.MaxStackSize?.Int32 ?? 1),
            isCarried:    p.IsCarried?.Boolean === 'True',
          };
        }
      }

      renderConfig();
      allRoutes = TransportAlgo.compute(filterStores(rawStores), itemData, transportConfig);
      statusEl.style.display = 'none';
      renderRoutes();
      renderIgnored();
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'error';
    }
  }

  init();
</script>
</body>
</html>
