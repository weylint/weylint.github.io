<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Store - Buying Offers</title>
    <script src="nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            margin: 0 auto;
        }

        header {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 6px;
        }

        header > p {
            color: #8b949e;
            font-size: 0.875rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .debug-toggle input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .loading {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            color: #8b949e;
            text-align: center;
        }

        .error {
            border: 1px solid #6e3030;
            border-radius: 8px;
            color: #f85149;
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .store-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .chart-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin: 16px 0;
        }

        .chart-container h3 {
            color: #8b949e;
            font-size: 0.875rem;
            font-weight: normal;
            margin-bottom: 12px;
        }

        .charts-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chart-box {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            text-align: center;
        }

        .chart-container canvas {
            max-width: 100%;
            max-height: 400px;
            margin: 0 auto;
        }

        .papers-summary {
            background: #0d1117;
            border-left: 3px solid #58a6ff;
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 4px 4px 0;
        }

        .papers-summary h4 {
            color: #58a6ff;
            font-size: 0.875rem;
            margin-bottom: 6px;
        }

        .papers-summary p {
            margin: 3px 0;
            color: #8b949e;
            font-size: 0.82rem;
        }

        .store-header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .store-name {
            color: #58a6ff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .store-owner {
            color: #8b949e;
            font-size: 0.875rem;
            margin-top: 5px;
        }

        .offers-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .offers-table th {
            background: #0d1117;
            padding: 7px 12px;
            text-align: left;
            font-weight: normal;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .offers-table th:hover {
            background: #1c2128;
        }

        .offers-table th.sortable::after {
            content: ' ⇅';
            opacity: 0.4;
        }

        .offers-table th.sorted-asc::after {
            content: ' ▲';
            opacity: 1;
        }

        .offers-table th.sorted-desc::after {
            content: ' ▼';
            opacity: 1;
        }

        .offers-table th.align-right,
        .offers-table td.align-right {
            text-align: right;
        }

        .offers-table td {
            padding: 6px 12px;
            border-top: 1px solid #21262d;
            white-space: nowrap;
            color: #c9d1d9;
        }

        .offers-table tr:hover td {
            background: #1c2128;
        }

        .price {
            color: #3fb950;
        }

        .quantity {
            color: #8b949e;
        }

        .item-available {
            text-decoration: line-through;
            opacity: 0.45;
        }

        .row-available {
            text-decoration: line-through;
            opacity: 0.45;
        }

        .no-offers {
            text-align: center;
            color: #6e7681;
            padding: 20px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.2s, color 0.2s;
        }

        .refresh-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .copy-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            margin-left: 10px;
            transition: border-color 0.2s, color 0.2s;
        }

        .copy-btn:hover {
            border-color: #3fb950;
            color: #3fb950;
        }

        .copy-btn.copied {
            color: #6e7681;
            border-color: #6e7681;
        }

        .last-update {
            color: #8b949e;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .debug-info {
            background: #0d1117;
            border-left: 3px solid #30363d;
            padding: 12px 16px;
            margin-top: 10px;
            border-radius: 0 4px 4px 0;
            font-family: inherit;
            font-size: 0.82rem;
            color: #8b949e;
        }

        .debug-info div {
            margin: 5px 0;
        }

        .debug-label {
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌠 Meteor Store - Buying Offers</h1>
            <p>Consolidated buying offers across all Meteor Stores.</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
                <label class="debug-toggle">
                    <input type="checkbox" id="debugModeToggle" onchange="toggleDebugMode()">
                    Debug Mode
                </label>
            </div>
            <div class="last-update" id="lastUpdate"></div>
            <div class="debug-info" id="debugInfo" style="display: none;"></div>
        </header>
        
        <div id="loading" class="loading">Loading data...</div>
        <div id="error" style="display: none;"></div>
        <div id="stores"></div>
    </div>

    <script src="white-tiger-api.js"></script>
    <script src="eco-render.js"></script>
    <script>
        // ============================================
        // DEBUG MODE - Controlled by checkbox
        // ============================================
        let DEBUG_MODE = false;
        // ============================================
        
        function toggleDebugMode() {
            DEBUG_MODE = document.getElementById('debugModeToggle').checked;
            const debugInfoEl = document.getElementById('debugInfo');
            
            if (DEBUG_MODE) {
                debugInfoEl.style.display = 'block';
                console.log('🔍 Debug mode enabled');
            } else {
                debugInfoEl.style.display = 'none';
                console.log('🔍 Debug mode disabled');
            }
        }
        
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const storesEl = document.getElementById('stores');
            const lastUpdateEl = document.getElementById('lastUpdate');
            const debugInfoEl = document.getElementById('debugInfo');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            storesEl.innerHTML = '';
            debugInfoEl.innerHTML = '';
            
            try {
                if (DEBUG_MODE) console.log('🔍 Starting data fetch...');
                
                // Fetch stores data
                const storesData = await WhiteTigerAPI.fetchStores();
                if (DEBUG_MODE) console.log('📦 Stores data received:', storesData);
                
                // Create a map of available items from ALL stores (selling offers)
                // Store both total availability and price-filtered availability
                const marketAvailability = {};
                const allStores = storesData.Stores || [];
                
                allStores.forEach(store => {
                    const offers = store.AllOffers || [];
                    offers.forEach(offer => {
                        // Check for selling offers (Buying = false)
                        if (offer.Buying === false && offer.Quantity > 0 && offer.Price > 0) {
                            const itemName = offer.ItemName;
                            if (!marketAvailability[itemName]) {
                                marketAvailability[itemName] = {
                                    total: 0,
                                    byPrice: []
                                };
                            }
                            marketAvailability[itemName].total += offer.Quantity;
                            marketAvailability[itemName].byPrice.push({
                                quantity: offer.Quantity,
                                price: offer.Price
                            });
                        }
                    });
                });
                
                if (DEBUG_MODE) console.log('🛒 Market availability:', marketAvailability);
                
                // Fetch recipes data
                const recipesData = await WhiteTigerAPI.fetchRecipes();
                if (DEBUG_MODE) console.log('📦 Recipes data received:', recipesData);
                
                // Create a map of item name to skill name + level
                const itemSkillMap = {};
                if (recipesData.Recipes) {
                    recipesData.Recipes.forEach(recipe => {
                        const variants = recipe.Variants || [];
                        const skillNeeds = recipe.SkillNeeds || [];
                        
                        // Check all variants for products
                        variants.forEach(variant => {
                            const products = variant.Products || [];
                            products.forEach(product => {
                                const itemName = product.Name;
                                
                                // Only map if we haven't seen this item yet (take first recipe)
                                if (itemName && !itemSkillMap[itemName]) {
                                    // Extract skill name and level from SkillNeeds[0]
                                    if (skillNeeds.length > 0 && skillNeeds[0].Skill) {
                                        const skillName = skillNeeds[0].Skill;
                                        const skillLevel = skillNeeds[0].Level || '';
                                        itemSkillMap[itemName] = skillLevel ? `${skillName} ${skillLevel}` : skillName;
                                    } else {
                                        itemSkillMap[itemName] = 'N/A';
                                    }
                                }
                            });
                        });
                    });
                }
                
                if (DEBUG_MODE) console.log('🔧 Item-Skill map created:', itemSkillMap);
                
                // Helper function to create table row
                const createTableRow = (offer) => {
                    const skillName = itemSkillMap[offer.ItemName] || 'N/A';
                    const itemData = marketAvailability[offer.ItemName];
                    
                    let inRangeQty = 0;
                    let outOfRangeQty = 0;
                    
                    if (itemData) {
                        const buyPrice = offer.Price;
                        const maxPrice = buyPrice * 1.2;
                        
                        itemData.byPrice.forEach(sellOffer => {
                            if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                inRangeQty += sellOffer.quantity;
                            } else if (sellOffer.price > maxPrice) {
                                outOfRangeQty += sellOffer.quantity;
                            }
                        });
                    }
                    
                    const availableDisplay = inRangeQty > 0 ? `${inRangeQty}` : '-';
                    const expensiveDisplay = outOfRangeQty > 0 ? outOfRangeQty : '-';
                    
                    return `
                        <tr>
                            <td data-value="${offer.ItemName || 'N/A'}">${offer.ItemName || 'N/A'}</td>
                            <td data-value="${offer.StoreName}">${EcoRender.storeNameHTML(offer.StoreName)}</td>
                            <td data-value="${skillName}">${skillName}</td>
                            <td class="price align-right" data-value="${offer.Price}">${offer.Price.toFixed(2)} €</td>
                            <td class="quantity align-right" data-value="${offer.Quantity}">${offer.Quantity}</td>
                            <td class="align-right" data-value="${inRangeQty}">${availableDisplay}</td>
                            <td class="align-right" data-value="${outOfRangeQty}">${expensiveDisplay}</td>
                            <td class="price align-right" data-value="${offer.Price * offer.Quantity}">${(offer.Price * offer.Quantity).toFixed(2)} €</td>
                        </tr>
                    `;
                };
                
                const createPaperTableRow = (offer) => {
                    const itemData = marketAvailability[offer.ItemName];
                    
                    let inRangeQty = 0;
                    let outOfRangeQty = 0;
                    
                    if (itemData) {
                        const buyPrice = offer.Price;
                        const maxPrice = buyPrice * 1.2;
                        
                        itemData.byPrice.forEach(sellOffer => {
                            if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                inRangeQty += sellOffer.quantity;
                            } else if (sellOffer.price > maxPrice) {
                                outOfRangeQty += sellOffer.quantity;
                            }
                        });
                    }
                    
                    const availableDisplay = inRangeQty > 0 ? `${inRangeQty}` : '-';
                    const expensiveDisplay = outOfRangeQty > 0 ? outOfRangeQty : '-';
                    
                    return `
                        <tr>
                            <td data-value="${offer.ItemName || 'N/A'}">${offer.ItemName || 'N/A'}</td>
                            <td data-value="${offer.StoreName}">${EcoRender.storeNameHTML(offer.StoreName)}</td>
                            <td class="price align-right" data-value="${offer.Price}">${offer.Price.toFixed(2)} €</td>
                            <td class="quantity align-right" data-value="${offer.Quantity}">${offer.Quantity}</td>
                            <td class="align-right" data-value="${inRangeQty}">${availableDisplay}</td>
                            <td class="align-right" data-value="${outOfRangeQty}">${expensiveDisplay}</td>
                            <td class="price align-right" data-value="${offer.Price * offer.Quantity}">${(offer.Price * offer.Quantity).toFixed(2)} €</td>
                        </tr>
                    `;
                };
                
                const createCompletedRow = (offer) => {
                    const skillName = itemSkillMap[offer.ItemName] || 'N/A';
                    const itemData = marketAvailability[offer.ItemName];
                    
                    let inRangeQty = 0;
                    let outOfRangeQty = 0;
                    
                    if (itemData) {
                        const buyPrice = offer.Price;
                        const maxPrice = buyPrice * 1.2;
                        
                        itemData.byPrice.forEach(sellOffer => {
                            if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                inRangeQty += sellOffer.quantity;
                            } else if (sellOffer.price > maxPrice) {
                                outOfRangeQty += sellOffer.quantity;
                            }
                        });
                    }
                    
                    const availableDisplay = inRangeQty > 0 ? `${inRangeQty}` : '-';
                    const expensiveDisplay = outOfRangeQty > 0 ? outOfRangeQty : '-';
                    
                    return `
                        <tr class="row-available">
                            <td data-value="${offer.ItemName || 'N/A'}">${offer.ItemName || 'N/A'}</td>
                            <td data-value="${offer.StoreName}">${EcoRender.storeNameHTML(offer.StoreName)}</td>
                            <td data-value="${skillName}">${skillName}</td>
                            <td class="price align-right" data-value="${offer.Price}">${offer.Price.toFixed(2)} €</td>
                            <td class="quantity align-right" data-value="${offer.Quantity}">${offer.Quantity}</td>
                            <td class="align-right" data-value="${inRangeQty}">${availableDisplay}</td>
                            <td class="align-right" data-value="${outOfRangeQty}">${expensiveDisplay}</td>
                            <td class="price align-right" data-value="${offer.Price * offer.Quantity}">${(offer.Price * offer.Quantity).toFixed(2)} €</td>
                        </tr>
                    `;
                };

                const stores = storesData.Stores || [];
                if (DEBUG_MODE) console.log(`🏪 Total stores: ${stores.length}`);
                
                // Debug: Log all store names
                if (DEBUG_MODE) {
                    stores.forEach((store, index) => {
                        console.log(`Store ${index + 1}: "${store.Name}" (Owner: ${store.Owner}, Enabled: ${store.Enabled})`);
                    });
                }
                
                const meteorStores = stores.filter(store => 
                    store.Name && store.Name.includes('Meteor Store')
                );
                
                // Sort Meteor Stores in reverse alphabetical order
                meteorStores.sort((a, b) => b.Name.localeCompare(a.Name));
                
                if (DEBUG_MODE) console.log(`🌠 Meteor Stores found: ${meteorStores.length}`);
                
                // Debug info display
                let totalBuyingOffers = 0;
                meteorStores.forEach(store => {
                    const buyingOffers = (store.AllOffers || []).filter(offer => 
                        offer.Buying === true && 
                        offer.Price > 0 && 
                        offer.Quantity > 0
                    );
                    totalBuyingOffers += buyingOffers.length;
                });
                
                if (DEBUG_MODE) {
                    debugInfoEl.innerHTML = `
                        <div><span class="debug-label">🔍 DEBUG INFO:</span></div>
                        <div>✓ Total stores: ${stores.length}</div>
                        <div>✓ Meteor Stores found: ${meteorStores.length}</div>
                        <div>✓ Active buying offers: ${totalBuyingOffers}</div>
                        <div>✓ All store names: ${stores.map(s => s.Name).join(', ') || 'None found'}</div>
                    `;
                }
                
                if (meteorStores.length === 0) {
                    storesEl.innerHTML = '<div class="store-card"><div class="no-offers">No Meteor Stores found</div></div>';
                } else {
                    // Consolidate all offers from all Meteor Stores
                    const allRegularOffers = [];
                    const allModernPapers = [];
                    const allAdvancedPapers = [];
                    const allCompletedItems = [];
                    
                    meteorStores.forEach(store => {
                        const allOffers = store.AllOffers || [];
                        const buyingOffers = allOffers.filter(offer => 
                            offer.Buying === true && 
                            offer.Price > 0 && 
                            offer.Quantity > 0
                        );
                        
                        buyingOffers.forEach(offer => {
                            // Add store name to offer
                            const offerWithStore = { ...offer, StoreName: store.Name };
                            
                            // Check availability
                            const itemData = marketAvailability[offer.ItemName];
                            let inRangeQty = 0;
                            
                            if (itemData) {
                                const buyPrice = offer.Price;
                                const maxPrice = buyPrice * 1.2;
                                
                                itemData.byPrice.forEach(sellOffer => {
                                    if (sellOffer.price > 0 && sellOffer.price <= maxPrice) {
                                        inRangeQty += sellOffer.quantity;
                                    }
                                });
                            }
                            
                            const isAvailable = inRangeQty >= offer.Quantity;
                            
                            // Categorize the offer
                            if (isAvailable) {
                                allCompletedItems.push(offerWithStore);
                            } else if (offer.ItemName && offer.ItemName.endsWith('Research Paper Modern')) {
                                allModernPapers.push(offerWithStore);
                            } else if (offer.ItemName && offer.ItemName.endsWith('Research Paper Advanced')) {
                                allAdvancedPapers.push(offerWithStore);
                            } else {
                                allRegularOffers.push(offerWithStore);
                            }
                        });
                    });
                    
                    if (DEBUG_MODE) {
                        console.log(`📋 Consolidated: ${allRegularOffers.length} regular, ${allModernPapers.length} modern papers, ${allAdvancedPapers.length} advanced papers, ${allCompletedItems.length} completed`);
                    }
                        
                    // Sort all categories
                    allRegularOffers.sort((a, b) => {
                        const skillA = itemSkillMap[a.ItemName] || 'N/A';
                        const skillB = itemSkillMap[b.ItemName] || 'N/A';
                        const skillComparison = skillA.localeCompare(skillB);
                        if (skillComparison !== 0) return skillComparison;
                        return (a.ItemName || '').localeCompare(b.ItemName || '');
                    });
                    
                    allModernPapers.sort((a, b) => (a.ItemName || '').localeCompare(b.ItemName || ''));
                    allAdvancedPapers.sort((a, b) => (a.ItemName || '').localeCompare(b.ItemName || ''));
                    allCompletedItems.sort((a, b) => (a.ItemName || '').localeCompare(b.ItemName || ''));
                    
                    // Calculate skill volumes for pie chart
                    const skillVolumes = {};
                    allRegularOffers.forEach(offer => {
                        const fullSkill = itemSkillMap[offer.ItemName] || 'N/A';
                        const skillName = fullSkill.replace(/\s+\d+$/, '');
                        const volume = offer.Price * offer.Quantity;
                        
                        if (!skillVolumes[skillName]) {
                            skillVolumes[skillName] = 0;
                        }
                        skillVolumes[skillName] += volume;
                    });
                    
                    // Add Modern Papers
                    let modernPaperVolume = 0;
                    allModernPapers.forEach(offer => {
                        modernPaperVolume += offer.Price * offer.Quantity;
                    });
                    if (modernPaperVolume > 0) {
                        skillVolumes['Modern Paper'] = modernPaperVolume;
                    }
                    
                    // Add Advanced Papers
                    let advancedPaperVolume = 0;
                    allAdvancedPapers.forEach(offer => {
                        advancedPaperVolume += offer.Price * offer.Quantity;
                    });
                    if (advancedPaperVolume > 0) {
                        skillVolumes['Advanced Paper'] = advancedPaperVolume;
                    }
                    
                    // Calculate paper volumes for detailed pie charts
                    const modernPaperVolumes = {};
                    allModernPapers.forEach(offer => {
                        const volume = offer.Price * offer.Quantity;
                        modernPaperVolumes[offer.ItemName] = volume;
                    });
                    
                    const advancedPaperVolumes = {};
                    allAdvancedPapers.forEach(offer => {
                        const volume = offer.Price * offer.Quantity;
                        advancedPaperVolumes[offer.ItemName] = volume;
                    });
                    
                    if (DEBUG_MODE) {
                        console.log(`📊 Skill volumes:`, skillVolumes);
                    }
                    
                    // Create single consolidated card
                    const storeCard = document.createElement('div');
                    storeCard.className = 'store-card';
                        
                    let offersHtml = '';
                    const tableId = 'table-regular';
                    const modernPapersTableId = 'table-modern-papers';
                    const advancedPapersTableId = 'table-advanced-papers';
                    const completedTableId = 'table-completed';
                    const chartId = 'chart-skills';
                    const modernPapersChartId = 'chart-modern-papers';
                    const advancedPapersChartId = 'chart-advanced-papers';
                            
                    // Create charts section
                    let chartsHtml = '<div class="chart-container"><div class="charts-wrapper">';
                    
                    if (Object.keys(skillVolumes).length > 0) {
                        chartsHtml += `
                            <div class="chart-box">
                                <h3>All Items by Skill</h3>
                                <canvas id="${chartId}"></canvas>
                            </div>
                        `;
                    }
                    
                    if (Object.keys(modernPaperVolumes).length > 0) {
                        chartsHtml += `
                            <div class="chart-box">
                                <h3>Modern Papers</h3>
                                <canvas id="${modernPapersChartId}"></canvas>
                            </div>
                        `;
                    }
                    
                    if (Object.keys(advancedPaperVolumes).length > 0) {
                        chartsHtml += `
                            <div class="chart-box">
                                <h3>Advanced Papers</h3>
                                <canvas id="${advancedPapersChartId}"></canvas>
                            </div>
                        `;
                    }
                    
                    chartsHtml += '</div></div>';
                            
                    // Create regular items table
                    let regularTableHtml = '';
                    if (allRegularOffers.length > 0) {
                        regularTableHtml = `
                            <h3>Regular Items</h3>
                            <table class="offers-table" id="${tableId}">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-column="item" onclick="sortTable('${tableId}', 'item', this)">Item</th>
                                        <th class="sortable" data-column="store" onclick="sortTable('${tableId}', 'store', this)">Store</th>
                                        <th class="sortable" data-column="skill" onclick="sortTable('${tableId}', 'skill', this)">Skill</th>
                                        <th class="sortable align-right" data-column="price" onclick="sortTable('${tableId}', 'price', this)">Price</th>
                                        <th class="sortable align-right" data-column="quantity" onclick="sortTable('${tableId}', 'quantity', this)">Quantity</th>
                                        <th class="sortable align-right" data-column="available" onclick="sortTable('${tableId}', 'available', this)">Available</th>
                                        <th class="sortable align-right" data-column="expensive" onclick="sortTable('${tableId}', 'expensive', this)">Too Expensive</th>
                                        <th class="sortable align-right" data-column="volume" onclick="sortTable('${tableId}', 'volume', this)">Volume</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${allRegularOffers.map(createTableRow).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                    // Create Modern Papers table
                    let modernPapersHtml = '';
                    if (allModernPapers.length > 0) {
                        const totalModernPapers = allModernPapers.reduce((sum, offer) => sum + offer.Quantity, 0);
                        const paperNeeded = totalModernPapers * 20;
                        const inkNeeded = totalModernPapers * 4;
                        
                        modernPapersHtml = `
                            <h3 style="margin-top: 30px;">Research Papers (Modern)</h3>
                            <div class="papers-summary">
                                <h4>📝 Materials Required</h4>
                                <p><strong>Paper needed:</strong> ${paperNeeded} (${totalModernPapers} papers × 20)</p>
                                <p><strong>Ink needed:</strong> ${inkNeeded} (${totalModernPapers} papers × 4)</p>
                            </div>
                            <table class="offers-table" id="${modernPapersTableId}">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-column="item" onclick="sortTable('${modernPapersTableId}', 'item', this)">Research Paper</th>
                                        <th class="sortable" data-column="store" onclick="sortTable('${modernPapersTableId}', 'store', this)">Store</th>
                                        <th class="sortable align-right" data-column="price" onclick="sortTable('${modernPapersTableId}', 'price', this)">Price</th>
                                        <th class="sortable align-right" data-column="quantity" onclick="sortTable('${modernPapersTableId}', 'quantity', this)">Quantity</th>
                                        <th class="sortable align-right" data-column="available" onclick="sortTable('${modernPapersTableId}', 'available', this)">Available</th>
                                        <th class="sortable align-right" data-column="expensive" onclick="sortTable('${modernPapersTableId}', 'expensive', this)">Too Expensive</th>
                                        <th class="sortable align-right" data-column="volume" onclick="sortTable('${modernPapersTableId}', 'volume', this)">Volume</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${allModernPapers.map(createPaperTableRow).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                    
                    // Create Advanced Papers table
                    let advancedPapersHtml = '';
                    if (allAdvancedPapers.length > 0) {
                        advancedPapersHtml = `
                            <h3 style="margin-top: 30px;">Research Papers (Advanced)</h3>
                            <table class="offers-table" id="${advancedPapersTableId}">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-column="item" onclick="sortTable('${advancedPapersTableId}', 'item', this)">Research Paper</th>
                                        <th class="sortable" data-column="store" onclick="sortTable('${advancedPapersTableId}', 'store', this)">Store</th>
                                        <th class="sortable align-right" data-column="price" onclick="sortTable('${advancedPapersTableId}', 'price', this)">Price</th>
                                        <th class="sortable align-right" data-column="quantity" onclick="sortTable('${advancedPapersTableId}', 'quantity', this)">Quantity</th>
                                        <th class="sortable align-right" data-column="available" onclick="sortTable('${advancedPapersTableId}', 'available', this)">Available</th>
                                        <th class="sortable align-right" data-column="expensive" onclick="sortTable('${advancedPapersTableId}', 'expensive', this)">Too Expensive</th>
                                        <th class="sortable align-right" data-column="volume" onclick="sortTable('${advancedPapersTableId}', 'volume', this)">Volume</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${allAdvancedPapers.map(createPaperTableRow).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                    
                    // Create Completed Items table
                    let completedHtml = '';
                    if (allCompletedItems.length > 0) {
                        completedHtml = `
                            <h3 style="margin-top: 30px;">Completed Items (Already Available)</h3>
                            <table class="offers-table" id="${completedTableId}">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-column="item" onclick="sortTable('${completedTableId}', 'item', this)">Item</th>
                                        <th class="sortable" data-column="store" onclick="sortTable('${completedTableId}', 'store', this)">Store</th>
                                        <th class="sortable" data-column="skill" onclick="sortTable('${completedTableId}', 'skill', this)">Skill</th>
                                        <th class="sortable align-right" data-column="price" onclick="sortTable('${completedTableId}', 'price', this)">Price</th>
                                        <th class="sortable align-right" data-column="quantity" onclick="sortTable('${completedTableId}', 'quantity', this)">Quantity</th>
                                        <th class="sortable align-right" data-column="available" onclick="sortTable('${completedTableId}', 'available', this)">Available</th>
                                        <th class="sortable align-right" data-column="expensive" onclick="sortTable('${completedTableId}', 'expensive', this)">Too Expensive</th>
                                        <th class="sortable align-right" data-column="volume" onclick="sortTable('${completedTableId}', 'volume', this)">Volume</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${allCompletedItems.map(createCompletedRow).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                    
                    offersHtml = chartsHtml + regularTableHtml + modernPapersHtml + advancedPapersHtml + completedHtml;
                    
                    storeCard.innerHTML = `
                        <div class="store-header">
                            <div class="store-name">
                                All Meteor Stores Consolidated
                                <button class="copy-btn" onclick="copyToClipboard(event, this)">📋 Copy for Discord</button>
                            </div>
                        </div>
                        ${offersHtml}
                    `;
                    
                    // Store data for Discord copy
                    const allOffers = [...allRegularOffers, ...allModernPapers, ...allAdvancedPapers, ...allCompletedItems];
                    storeCard.dataset.storeName = 'All Meteor Stores';
                    storeCard.dataset.storeOffers = JSON.stringify(allOffers.map(offer => ({
                        ...offer,
                        Skill: itemSkillMap[offer.ItemName] || 'N/A'
                    })));
                    storesEl.appendChild(storeCard);
                    
                    // Create pie charts after DOM is updated
                    if (Object.keys(skillVolumes).length > 0) {
                        createPieChart(chartId, skillVolumes);
                    }
                    
                    if (Object.keys(modernPaperVolumes).length > 0) {
                        createPieChart(modernPapersChartId, modernPaperVolumes);
                    }
                    
                    if (Object.keys(advancedPaperVolumes).length > 0) {
                        createPieChart(advancedPapersChartId, advancedPaperVolumes);
                    }
                }
                
                lastUpdateEl.textContent = `Last updated: ${new Date().toLocaleString('en-US')}`;
                if (DEBUG_MODE) console.log('✅ Data loaded successfully');
                
            } catch (error) {
                errorEl.style.display = 'block';
                errorEl.className = 'error';
                errorEl.textContent = `Error loading data: ${error.message}`;
                console.error('❌ Error:', error);
                
                if (DEBUG_MODE) {
                    debugInfoEl.style.display = 'block';
                    debugInfoEl.innerHTML = `
                        <div><span class="debug-label">❌ ERROR:</span></div>
                        <div>${error.message}</div>
                        <div>Check browser console (F12) for details</div>
                    `;
                }
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        // Load data on page load
        loadData();
        
        // Create pie chart using Chart.js
        function createPieChart(canvasId, skillVolumes) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            // Sort skills by volume (descending)
            const sortedSkills = Object.entries(skillVolumes)
                .sort((a, b) => b[1] - a[1])
                .map(entry => entry[0]);
            
            const volumes = sortedSkills.map(skill => skillVolumes[skill]);
            
            // Generate colors for each skill
            const colors = generateColors(sortedSkills.length);
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: sortedSkills,
                    datasets: [{
                        data: volumes,
                        backgroundColor: colors,
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                padding: 10,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${value.toFixed(2)} € (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Generate distinct colors for pie chart
        function generateColors(count) {
            const colors = [];
            const baseHues = [0, 30, 60, 120, 180, 210, 240, 270, 300, 330];
            
            for (let i = 0; i < count; i++) {
                const hue = baseHues[i % baseHues.length];
                const saturation = 70 - (Math.floor(i / baseHues.length) * 15);
                const lightness = 60 + (Math.floor(i / baseHues.length) * 5);
                colors.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }
            
            return colors;
        }
        
        // Copy store data to clipboard for Discord
        function copyToClipboard(event, buttonEl) {
            event.preventDefault();
            const storeCard = buttonEl.closest('.store-card');
            const storeName = storeCard.dataset.storeName;
            const offers = JSON.parse(storeCard.dataset.storeOffers);
            
            if (offers.length === 0) {
                alert('No offers to copy!');
                return;
            }
            
            // Build Discord-formatted message with code block
            let discordMessage = `**${storeName}** - Buying Offers:\n\`\`\`\n`;
            discordMessage += `${'Item'.padEnd(30)} | ${'Skill'.padEnd(20)} | ${'Price'.padEnd(10)} | ${'Qty'.padEnd(6)} | Volume\n`;
            discordMessage += `${'-'.repeat(30)} | ${'-'.repeat(20)} | ${'-'.repeat(10)} | ${'-'.repeat(6)} | ${'-'.repeat(10)}\n`;
            
            offers.forEach(offer => {
                const itemName = (offer.ItemName || 'N/A').padEnd(30);
                const skillName = (offer.Skill || 'N/A').padEnd(20);
                const price = (offer.Price.toFixed(2) + ' €').padEnd(10);
                const quantity = offer.Quantity.toString().padEnd(6);
                const volume = (offer.Price * offer.Quantity).toFixed(2) + ' €';
                discordMessage += `${itemName} | ${skillName} | ${price} | ${quantity} | ${volume}\n`;
            });
            
            discordMessage += `\`\`\``;
            
            // Copy to clipboard
            navigator.clipboard.writeText(discordMessage).then(() => {
                const originalText = buttonEl.textContent;
                buttonEl.textContent = '✅ Copied!';
                buttonEl.classList.add('copied');
                
                setTimeout(() => {
                    buttonEl.textContent = originalText;
                    buttonEl.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard. Please check browser permissions.');
            });
        }
        
        // Sort table by column
        const tableSortStates = {};
        
        function sortTable(tableId, column, headerEl) {
            const table = document.getElementById(tableId);
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            // Initialize sort state for this table
            if (!tableSortStates[tableId]) {
                tableSortStates[tableId] = {};
            }
            
            // Determine sort direction
            const currentDirection = tableSortStates[tableId][column] || 'none';
            const newDirection = currentDirection === 'asc' ? 'desc' : 'asc';
            tableSortStates[tableId][column] = newDirection;
            
            // Remove all sort indicators
            table.querySelectorAll('th').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
            });
            
            // Add sort indicator to current header
            headerEl.classList.add(newDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
            
            // Sort rows
            rows.sort((a, b) => {
                const aCell = a.querySelector(`td[data-value]:nth-child(${getColumnIndex(column)})`);
                const bCell = b.querySelector(`td[data-value]:nth-child(${getColumnIndex(column)})`);
                
                const aValue = aCell.dataset.value;
                const bValue = bCell.dataset.value;
                
                let comparison = 0;
                
                // Numeric comparison for price, quantity, volume
                if (column === 'price' || column === 'quantity' || column === 'volume') {
                    comparison = parseFloat(aValue) - parseFloat(bValue);
                } else {
                    // String comparison for item
                    comparison = aValue.localeCompare(bValue);
                }
                
                return newDirection === 'asc' ? comparison : -comparison;
            });
            
            // Reorder rows in DOM
            rows.forEach(row => tbody.appendChild(row));
        }
        
        function getColumnIndex(column) {
            const columnMap = {
                'item': 1,
                'store': 2,
                'skill': 3,
                'price': 4,
                'quantity': 5,
                'available': 6,
                'expensive': 7,
                'volume': 8
            };
            return columnMap[column];
        }
        
        // Optional: Auto-refresh every 30 seconds
        // setInterval(loadData, 30000);
    </script>
